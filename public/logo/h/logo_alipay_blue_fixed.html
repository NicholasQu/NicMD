<!DOCTYPE html>

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0f0f0f; color:#e0e0e0; padding:40px; }
  h1 { text-align:center; font-size:32px; margin-bottom:6px; color:#fff; }
  .subtitle { text-align:center; font-size:14px; color:#888; margin-bottom:40px; }
  .section { margin:60px 0; }
  .section-title { font-size:22px; font-weight:700; color:#f97316; margin-bottom:24px; padding-left:12px; border-left:4px solid #f97316; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:30px; max-width:1600px; margin:0 auto; }
  .card { background:#1a1a1a; border-radius:18px; padding:28px; text-align:center; border:1px solid #2a2a2a; transition:all .3s; }

  .card .title { font-size:16px; font-weight:600; color:#fff; margin-bottom:8px; }
  .card .desc { font-size:12px; color:#888; margin-bottom:18px; }
  .card .color-code { font-size:11px; color:#666; font-family:monospace; margin-bottom:16px; }
  .card .svg-wrap { width:320px; height:320px; margin:0 auto 12px; border-radius:36px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,0.4); }
  .card .svg-wrap svg { width:100%; height:100%; }
</style>
</head>
