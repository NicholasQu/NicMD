  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0f0f0f; color:#e0e0e0; padding:40px; }
  h1 { text-align:center; font-size:32px; margin-bottom:6px; color:#fff; }
  .subtitle { text-align:center; font-size:14px; color:#888; margin-bottom:40px; }
  .section { margin:60px 0; }
  .section-title { font-size:22px; font-weight:700; color:#f97316; margin-bottom:24px; padding-left:12px; border-left:4px solid #f97316; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; max-width:1600px; margin:0 auto; }
  .card { background:#1a1a1a; border-radius:18px; padding:30px; text-align:center; border:1px solid #2a2a2a; transition:all .3s; }
  .card:hover { border-color:#f97316; transform:translateY(-4px); box-shadow:0 12px 40px rgba(249,115,22,0.15); }
  .card .color-name { font-size:18px; font-weight:600; color:#fff; margin-bottom:8px; }
  .card .color-hex { font-size:13px; color:#888; margin-bottom:16px; font-family:monospace; }
  .card .svg-wrap { width:280px; height:280px; margin:0 auto 16px; border-radius:50%; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .card .svg-wrap svg { width:100%; height:100%; }
  .card .desc { font-size:14px; color:#666; margin-top:12px; }
  .mood { display:inline-block; padding:4px 10px; border-radius:12px; font-size:11px; margin-top:8px; }
  .mood.bright { background:#0a3d2e; color:#6ee7b7; }
  .mood.cool { background:#1e3a8a; color:#93c5fd; }
  .mood.warm { background:#7c2d12; color:#fdba74; }
  .mood.chic { background:#581c87; color:#c084fc; }
  .mood.fresh { background:#0ea5e9; color:#e0f2fe; }
